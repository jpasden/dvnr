<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DVNR</title>
  <style>
/* ============================================================
   DVNR — static reader styles
   Adapted from style.css for standalone use (no server dependency).
   ============================================================ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html { font-size: 16px; }

body {
  font-family: 'Arial Unicode MS', Arial, sans-serif;
  color: #222;
  background: #fafaf8;
  line-height: 1.6;
}

a {
  color: #2a6496;
  text-decoration: none;
}
a:hover { text-decoration: underline; }

/* Site header */
.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 2rem;
  background: #1a1a2e;
  color: #e8e8f0;
  border-bottom: 2px solid #2a2a4e;
}
.site-title {
  font-size: 1.3rem;
  font-weight: bold;
  color: #e8e8f0;
  letter-spacing: 0.05em;
  font-family: 'Courier New', monospace;
  text-decoration: none;
}
.site-title:hover { color: #fff; text-decoration: none; }
.site-nav a {
  color: #c8c8e0;
  margin-left: 1.5rem;
  font-family: sans-serif;
  font-size: 0.9rem;
}
.site-nav a:hover { color: #fff; text-decoration: none; }

/* Main layout */
.site-main {
  padding: 0;
}

/* Buttons */
.btn {
  display: inline-block;
  padding: 0.45rem 1rem;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: #fff;
  color: #333;
  font-family: sans-serif;
  font-size: 0.875rem;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  text-decoration: none;
}
.btn:hover { background: #f0f0f0; text-decoration: none; color: #333; }
.btn-small { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
.btn-print { background: #2a6496; color: #fff; border-color: #2a6496; }
.btn-print:hover { background: #1e4d73; color: #fff; }
.btn-clear { color: #666; }
.hidden { display: none !important; }

/* Reader layout */
.reader-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  min-height: calc(100vh - 120px);
  align-items: start;
  overflow: hidden;
  padding: 0 1rem;
}
.reader-layout > * { min-width: 0; }

/* Text column */
.text-column {
  padding: 1rem 1.5rem 2rem 0;
  border-right: 1px solid #ddd;
}
.text-controls {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid #eee;
}
.size-controls {
  display: flex;
  align-items: center;
  gap: 0.3rem;
}
.controls-label {
  font-family: sans-serif;
  font-size: 0.8rem;
  color: #777;
  margin-right: 0.2rem;
}
.size-btn {
  padding: 0.25rem 0.55rem;
  border: 1px solid #ccc;
  border-radius: 3px;
  background: #fff;
  font-family: sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  color: #555;
  transition: background 0.12s;
}
.size-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
.size-btn:hover:not(.active) { background: #f0f0f0; }

.lang-label {
  font-family: sans-serif;
  font-size: 0.82rem;
  color: #888;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 0.2rem 0.5rem;
  border: 1px solid #ddd;
  border-radius: 3px;
  background: #f5f5f5;
}
.lang-es { background: #ffeeba; color: #856404; border-color: #ffc107; }
.lang-it { background: #d4edda; color: #155724; border-color: #c3e6cb; }

.text-meta { margin-bottom: 1rem; }
.text-title {
  font-size: 1.3rem;
  font-family: 'Arial Unicode MS', Arial, sans-serif;
  margin-bottom: 0.2rem;
}
.text-author {
  font-size: 0.9rem;
  color: #666;
  font-family: sans-serif;
  font-style: italic;
}
.text-title-line {
  font-size: 1.4em;
  font-weight: 700;
  margin-bottom: 0.6em;
  line-height: 1.3;
}
.text-body {
  line-height: 1.9;
  word-spacing: 0.02em;
  overflow-wrap: break-word;
  word-break: break-word;
  white-space: normal;
}
.text-body.size-s  { font-size: 1.1rem; }
.text-body.size-m  { font-size: 1.3rem; }
.text-body.size-l  { font-size: 1.55rem; }
.text-body.size-xl { font-size: 1.85rem; }

/* Token & chunk styling */
.token {
  display: inline;
  cursor: pointer;
  border-radius: 3px;
  padding: 0 1px;
  transition: background 0.1s;
}
.token.is-punct,
.token.is-space {
  pointer-events: none;
  cursor: default;
}
.token:not(.is-punct):not(.is-space):hover { background-color: #f0f0f0; }
.token.highlighted { background-color: #fff3b0; font-weight: bold; }
.chunk { display: inline; border-bottom: 2px solid #ccc; padding-bottom: 1px; }
.chunk.chunk-hover { background-color: #fffde7; }
.chunk.chunk-selected { background-color: #fffde7; }

/* Notes column */
.notes-column {
  padding: 1rem 0 2rem 1.5rem;
  position: sticky;
  top: 0;
  max-height: 100vh;
  overflow-y: auto;
}
.notes-header h2 {
  font-size: 1rem;
  font-family: sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #333;
  margin-bottom: 0.5rem;
}
.notes-reminder {
  background: #fff8e1;
  border: 1px solid #ffe082;
  color: #795548;
  font-family: sans-serif;
  font-size: 0.8rem;
  padding: 0.4rem 0.7rem;
  border-radius: 4px;
  margin-bottom: 0.75rem;
}
.notes-actions {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1rem;
}
.notes-empty {
  font-family: sans-serif;
  font-size: 0.9rem;
  color: #999;
  font-style: italic;
}
.notes-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.note-entry {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
  padding: 0.4rem 0.75rem;
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 5px;
  font-family: 'Arial Unicode MS', Arial, sans-serif;
  font-size: 1.1rem;
  position: relative;
  transition: background 0.2s;
  flex-wrap: wrap;
}
.note-entry.note-pulse { background: #fff9c4; }
.note-number {
  flex-shrink: 0;
  font-weight: 700;
  color: #888;
  min-width: 1.5rem;
  font-size: 0.8rem;
  padding-top: 0.1rem;
}
.note-body {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 0.3rem 0.5rem;
}
.note-surface {
  font-family: 'Arial Unicode MS', Arial, sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: #1a1a2e;
  flex-shrink: 0;
}
.note-line {
  font-size: 1rem;
  color: #444;
  line-height: 1.4;
  white-space: nowrap;
}
.note-label { color: #777; font-style: italic; }
.note-dismiss {
  flex-shrink: 0;
  border: 1px solid transparent;
  border-radius: 3px;
  background: none;
  cursor: pointer;
  color: #c0392b;
  font-size: 0.75rem;
  padding: 0.1rem 0.3rem;
  line-height: 1;
  transition: background 0.12s, color 0.12s;
  align-self: center;
}
.note-dismiss:hover { background: #c0392b; color: #fff; font-weight: bold; }

/* Error / not-found state */
.not-found {
  max-width: 480px;
  margin: 4rem auto;
  text-align: center;
  font-family: sans-serif;
  color: #555;
}
.not-found h1 {
  font-size: 1.5rem;
  margin-bottom: 1rem;
  color: #222;
}
.not-found p { margin-bottom: 0.75rem; }

/* Print styles */
@media print {
  .site-header,
  .text-controls,
  #text-controls,
  .notes-actions,
  #notes-actions,
  .note-dismiss,
  .notes-reminder,
  #notes-reminder,
  .btn {
    display: none !important;
  }
  body { background: #fff; color: #000; font-size: 10pt; }
  .site-main { padding: 0; max-width: none; }
  .reader-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5cm;
    min-height: auto;
    padding: 0;
  }
  .text-column {
    border-right: none;
    padding: 0;
    font-family: 'Arial Unicode MS', Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.8;
  }
  .text-body { font-size: 11pt !important; }
  .token.highlighted,
  .token:hover,
  .chunk.chunk-hover,
  .chunk.chunk-selected {
    background: none !important;
    font-weight: normal !important;
  }
  .chunk { border-bottom: 1.5pt solid #999; padding-bottom: 1pt; }
  .notes-column {
    position: static;
    max-height: none;
    overflow: visible;
    padding: 0;
    font-family: 'Arial Unicode MS', Arial, sans-serif;
    border-left: 2pt solid #999;
    padding-left: 1cm;
  }
  .notes-header h2 { font-size: 10pt; margin-bottom: 0.4cm; }
  .notes-list { gap: 0.4cm; }
  .note-entry { border: none; padding: 0; background: none; font-size: 9.5pt; gap: 0.3cm; }
  .note-surface { font-size: 10.5pt; }
  .notes-empty { display: none; }
  @page { margin: 1.5cm; }
}
  </style>
</head>
<body>

  <header class="site-header">
    <a class="site-title" href="index.html">Dynamic Vocab Notes Reader</a>
    <nav class="site-nav" id="back-nav">
      <!-- Populated by JS once language is known -->
    </nav>
  </header>

  <main class="site-main" id="main-content">
    <!-- Populated by JS -->
  </main>

  <div id="not-found" class="not-found" style="display:none;">
    <h1>Text not found</h1>
    <p>No text was found for this URL.</p>
    <p>
      <a href="index.html">← All texts</a>
    </p>
  </div>

  <script>
(function () {
  'use strict';

  // ---------------------------------------------------------------------------
  // Load text from hash, fetch JSON, render reader
  // ---------------------------------------------------------------------------

  var slug = (window.location.hash || '').replace(/^#/, '').trim();

  if (!slug) {
    showNotFound();
    return;
  }

  fetch('texts/' + slug + '.json')
    .then(function (r) {
      if (!r.ok) throw new Error('Not found');
      return r.json();
    })
    .then(function (data) {
      initReader(data);
    })
    .catch(function () {
      showNotFound();
    });

  function showNotFound() {
    document.getElementById('not-found').style.display = 'block';
  }

  function initReader(data) {
    var tokens = data.tokens || [];
    var language = data.language || 'es';
    var title = data.title || '';
    var author = data.author || null;
    var langLabel = language === 'it' ? 'IT' : 'ES';
    var langClass = language === 'it' ? 'lang-it' : 'lang-es';
    // Update back nav
    var backNav = document.getElementById('back-nav');
    if (backNav) {
      backNav.innerHTML = '<a href="index.html">← Back</a>';
    }

    // Update page title
    document.title = (title ? title + ' — ' : '') + 'DVNR';

    // Build reader HTML
    var main = document.getElementById('main-content');
    main.innerHTML =
      '<div class="reader-layout">' +
        '<div class="text-column" id="text-column">' +
          '<div class="text-controls" id="text-controls">' +
            '<div class="size-controls">' +
              '<span class="controls-label">Size:</span>' +
              '<button class="size-btn" data-size="s">S</button>' +
              '<button class="size-btn active" data-size="m">M</button>' +
              '<button class="size-btn" data-size="l">L</button>' +
              '<button class="size-btn" data-size="xl">XL</button>' +
            '</div>' +
            '<span class="lang-label ' + langClass + '">' + langLabel + '</span>' +
          '</div>' +
          '<div class="text-meta">' +
            '<h2 class="text-title">' + escapeHtml(title) + '</h2>' +
            (author ? '<p class="text-author">' + escapeHtml(author) + '</p>' : '') +
          '</div>' +
          '<div class="text-body size-m" id="text-body"></div>' +
        '</div>' +
        '<div class="notes-column" id="notes-column">' +
          '<div class="notes-header"><h2>Vocabulary Notes</h2></div>' +
          '<div class="notes-reminder" id="notes-reminder">Notes are lost on refresh — print to save.</div>' +
          '<div class="notes-actions" id="notes-actions">' +
            '<button class="btn btn-small btn-clear" id="clear-all-btn">Clear all</button>' +
            '<button class="btn btn-small btn-print" onclick="window.print()">Print</button>' +
          '</div>' +
          '<ol class="notes-list" id="notes-list"></ol>' +
          '<p class="notes-empty" id="notes-empty">Click any word in the text to add a note.</p>' +
        '</div>' +
      '</div>';

    // Now run the reader logic with the fetched tokens
    runReader(tokens);
  }

  // ---------------------------------------------------------------------------
  // Reader logic (adapted from reader.js — preserves all interaction behaviour)
  // ---------------------------------------------------------------------------

  function runReader(tokens) {
    var noteCounter = 0;
    var notesMap = new Map();

    var textBody = document.getElementById('text-body');
    var notesList = document.getElementById('notes-list');
    var notesEmpty = document.getElementById('notes-empty');
    var clearAllBtn = document.getElementById('clear-all-btn');

    function makeNoteKey(surfaceText) {
      return surfaceText.trim().toLowerCase();
    }

    function posClass(pos) {
      if (!pos) return 'pos-other';
      return 'pos-' + pos.toLowerCase();
    }

    function chunkRoleClass(role) {
      if (!role || role === 'solo') return 'chunk-solo';
      return 'chunk-' + role;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // --- Text rendering ---

    function renderTokens() {
      if (!textBody || !tokens.length) return;

      var segments = [];
      var i = 0;
      while (i < tokens.length) {
        var tok = tokens[i];
        if (tok.chunk_id !== null && tok.chunk_id !== undefined) {
          var chunkId = tok.chunk_id;
          var chunkTokens = [];
          while (i < tokens.length && tokens[i].chunk_id === chunkId) {
            chunkTokens.push(tokens[i]);
            i++;
          }
          segments.push({ type: 'chunk', chunkId: chunkId, tokens: chunkTokens });
        } else {
          segments.push({ type: 'token', token: tok });
          i++;
        }
      }

      var fragment = document.createDocumentFragment();

      segments.forEach(function (seg, segIdx) {
        if (seg.type === 'token') {
          var tok2 = seg.token;
          if (tok2.is_newline) {
            fragment.appendChild(document.createElement('br'));
            return;
          }
          if (!tok2.is_space) {
            var span = makeTokenSpan(tok2);
            fragment.appendChild(span);
          }
        } else {
          var chunkSpan = document.createElement('span');
          chunkSpan.className = 'chunk';
          chunkSpan.dataset.chunkId = seg.chunkId;
          var visibleToks = seg.tokens.filter(function (t) { return !t.is_space && !t.is_newline; });
          visibleToks.forEach(function (tok3, idx2) {
            var sp = makeTokenSpan(tok3);
            chunkSpan.appendChild(sp);
            if (idx2 < visibleToks.length - 1 && !visibleToks[idx2 + 1].is_punct) {
              chunkSpan.appendChild(document.createTextNode(' '));
            }
          });
          fragment.appendChild(chunkSpan);
        }

        // Find the next non-space, non-newline segment to decide whether to add a space
        var nextRealTok = null;
        for (var ni = segIdx + 1; ni < segments.length; ni++) {
          var ns = segments[ni];
          if (ns.type === 'token') {
            if (!ns.token.is_space && !ns.token.is_newline) { nextRealTok = ns.token; break; }
          } else {
            var nf = ns.tokens.find(function (t) { return !t.is_space && !t.is_newline; });
            if (nf) { nextRealTok = nf; break; }
          }
        }
        if (nextRealTok && !nextRealTok.is_punct) {
          fragment.appendChild(document.createTextNode(' '));
        }
      });

      textBody.appendChild(fragment);
      attachInteractions();
    }

    function makeTokenSpan(tok) {
      var span = document.createElement('span');
      var classes = ['token', posClass(tok.pos), chunkRoleClass(tok.chunk_role)];
      if (tok.is_punct) classes.push('is-punct');
      if (tok.is_space) classes.push('is-space');
      span.className = classes.join(' ');
      span.dataset.idx = tok.idx;
      span.dataset.text = tok.text;
      span.dataset.lemma = tok.lemma || '';
      span.dataset.pos = tok.pos || '';
      if (tok.definition_surface) span.dataset.defSurface = tok.definition_surface;
      if (tok.definition_lemma) span.dataset.defLemma = tok.definition_lemma;
      if (tok.chunk_id != null) span.dataset.chunkId = tok.chunk_id;
      if (tok.fixed_expr_def) span.dataset.fixedExprDef = tok.fixed_expr_def;
      if (tok.fixed_expr_canonical) span.dataset.fixedExprCanonical = tok.fixed_expr_canonical;
      if (tok.chunk_definition && tok.chunk_role === 'start') span.dataset.chunkDefinition = tok.chunk_definition;
      span.textContent = tok.text;
      return span;
    }

    // --- Interactions ---

    function attachInteractions() {
      document.querySelectorAll('.chunk').forEach(function (chunkEl) {
        chunkEl.addEventListener('mouseenter', function () { chunkEl.classList.add('chunk-hover'); });
        chunkEl.addEventListener('mouseleave', function () { chunkEl.classList.remove('chunk-hover'); });
      });
      document.querySelectorAll('.token').forEach(function (tokenEl) {
        if (tokenEl.classList.contains('is-punct') || tokenEl.classList.contains('is-space')) return;
        tokenEl.addEventListener('click', function (e) {
          e.stopPropagation();
          handleTokenClick(tokenEl);
        });
      });
    }

    function handleTokenClick(tokenEl) {
      var chunkId = tokenEl.dataset.chunkId;
      if (chunkId) {
        handleChunkClick(chunkId, tokenEl);
      } else {
        handleSoloTokenClick(tokenEl);
      }
    }

    function handleSoloTokenClick(tokenEl) {
      var surface = tokenEl.dataset.text;
      var noteKey = makeNoteKey(surface);
      if (notesMap.has(noteKey)) {
        highlightToken(tokenEl);
        scrollToNote(noteKey);
        return;
      }
      highlightToken(tokenEl);
      addSoloTokenNote(tokenEl);
    }

    function handleChunkClick(chunkId, clickedTokenEl) {
      var chunkEl = clickedTokenEl.closest('.chunk');
      if (!chunkEl) { handleSoloTokenClick(clickedTokenEl); return; }
      var chunkTokenEls = Array.from(chunkEl.querySelectorAll('.token'));
      var chunkText = chunkTokenEls.map(function (t) { return t.dataset.text; }).join(' ');
      var noteKey = makeNoteKey(chunkText);
      if (notesMap.has(noteKey)) {
        highlightChunk(chunkEl);
        scrollToNote(noteKey);
        return;
      }
      highlightChunk(chunkEl);
      addChunkNote(chunkEl, chunkTokenEls);
    }

    function highlightToken(tokenEl) { tokenEl.classList.add('highlighted'); }
    function highlightChunk(chunkEl) {
      chunkEl.classList.add('chunk-selected');
      chunkEl.querySelectorAll('.token').forEach(function (t) { t.classList.add('highlighted'); });
    }

    // --- Note creation ---

    function addSoloTokenNote(tokenEl) {
      var surface = tokenEl.dataset.text;
      var lemma = tokenEl.dataset.lemma;
      var pos = tokenEl.dataset.pos;
      var defSurface = tokenEl.dataset.defSurface || '';
      var defLemma = tokenEl.dataset.defLemma || '';
      var isVerb = pos === 'VERB' || pos === 'AUX';
      var noteKey = makeNoteKey(surface);

      noteCounter++;
      var noteEl = document.createElement('li');
      noteEl.className = 'note-entry';
      noteEl.dataset.noteKey = noteKey;

      var html = '<div class="note-number">' + noteCounter + '.</div>';
      html += '<div class="note-body">';
      html += '<span class="note-surface">' + escapeHtml(surface) + '</span>';
      if (isVerb && lemma && lemma !== surface.toLowerCase()) {
        html += '<span class="note-line note-infinitive"><span class="note-label">[infinitive: ' + escapeHtml(lemma) + ']</span></span>';
      }
      if (isVerb) {
        if (defSurface) html += '<span class="note-line note-def-surface">' + escapeHtml(defSurface) + '</span>';
        if (defLemma) html += '<span class="note-line note-def-lemma">' + escapeHtml(defLemma) + '</span>';
      } else {
        if (defLemma) html += '<span class="note-line note-def-lemma">' + escapeHtml(defLemma) + '</span>';
      }
      html += '</div>';
      html += '<button class="note-dismiss" aria-label="Remove note" data-note-key="' + escapeHtml(noteKey) + '">&#x2715;</button>';
      noteEl.innerHTML = html;
      appendNote(noteEl, noteKey, [tokenEl]);
    }

    function addChunkNote(chunkEl, chunkTokenEls) {
      var chunkText = chunkTokenEls.map(function (t) { return t.dataset.text; }).join(' ');
      var noteKey = makeNoteKey(chunkText);
      var firstToken = chunkTokenEls[0];
      var fixedExprDef = firstToken ? (firstToken.dataset.fixedExprDef || '') : '';
      var fixedExprCanonical = firstToken ? (firstToken.dataset.fixedExprCanonical || '') : '';
      var chunkDefinition = firstToken ? (firstToken.dataset.chunkDefinition || '') : '';
      var lemmaForm = chunkTokenEls
        .filter(function (t) { return !t.classList.contains('is-punct'); })
        .map(function (t) { return t.dataset.lemma || t.dataset.text; })
        .join(' ');

      noteCounter++;
      var noteEl = document.createElement('li');
      noteEl.className = 'note-entry note-chunk';
      noteEl.dataset.noteKey = noteKey;

      var html = '<div class="note-number">' + noteCounter + '.</div>';
      html += '<div class="note-body">';
      html += '<span class="note-surface">' + escapeHtml(chunkText) + '</span>';
      var canonical = fixedExprCanonical || (lemmaForm !== chunkText.toLowerCase() ? lemmaForm : '');
      if (canonical) {
        html += '<span class="note-line"><span class="note-label">[' + escapeHtml(canonical) + ']</span></span>';
      }
      var definition = fixedExprDef || chunkDefinition;
      if (definition) {
        html += '<span class="note-line note-def-lemma">' + escapeHtml(definition) + '</span>';
      } else {
        var firstVerb = chunkTokenEls.find(function (t) { return t.dataset.pos === 'VERB' || t.dataset.pos === 'AUX'; });
        if (firstVerb && firstVerb.dataset.defLemma) {
          html += '<span class="note-line note-def-lemma">' + escapeHtml(firstVerb.dataset.defLemma) + '</span>';
        }
      }
      html += '</div>';
      html += '<button class="note-dismiss" aria-label="Remove note" data-note-key="' + escapeHtml(noteKey) + '">&#x2715;</button>';
      noteEl.innerHTML = html;
      appendNote(noteEl, noteKey, chunkTokenEls);
    }

    function appendNote(noteEl, noteKey, tokenEls) {
      notesList.appendChild(noteEl);
      notesMap.set(noteKey, { noteEl: noteEl, tokenEls: tokenEls });
      noteEl.querySelector('.note-dismiss').addEventListener('click', function () {
        removeNote(noteKey);
      });
      updateNotesEmpty();
      noteEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function removeNote(noteKey) {
      var entry = notesMap.get(noteKey);
      if (!entry) return;
      entry.noteEl.remove();
      notesMap.delete(noteKey);
      if (entry.tokenEls) {
        entry.tokenEls.forEach(function (t) { t.classList.remove('highlighted'); });
      }
      renumberNotes();
      updateNotesEmpty();
    }

    function renumberNotes() {
      var items = notesList.querySelectorAll('.note-entry');
      items.forEach(function (item, idx) {
        var numEl = item.querySelector('.note-number');
        if (numEl) numEl.textContent = (idx + 1) + '.';
      });
      noteCounter = items.length;
    }

    function updateNotesEmpty() {
      if (notesEmpty) {
        notesEmpty.style.display = notesMap.size === 0 ? 'block' : 'none';
      }
    }

    function scrollToNote(noteKey) {
      var entry = notesMap.get(noteKey);
      if (!entry) return;
      entry.noteEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      entry.noteEl.classList.add('note-pulse');
      setTimeout(function () { entry.noteEl.classList.remove('note-pulse'); }, 800);
    }

    // --- Clear all ---
    if (clearAllBtn) {
      clearAllBtn.addEventListener('click', function () {
        if (notesMap.size === 0) return;
        notesList.innerHTML = '';
        notesMap.clear();
        noteCounter = 0;
        document.querySelectorAll('.token.highlighted').forEach(function (el) { el.classList.remove('highlighted'); });
        document.querySelectorAll('.chunk.chunk-selected').forEach(function (el) { el.classList.remove('chunk-selected'); });
        updateNotesEmpty();
      });
    }

    // --- Size controls ---
    var sizeClasses = ['size-s', 'size-m', 'size-l', 'size-xl'];
    document.querySelectorAll('.size-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var size = btn.dataset.size;
        if (!textBody) return;
        sizeClasses.forEach(function (cls) { textBody.classList.remove(cls); });
        textBody.classList.add('size-' + size);
        document.querySelectorAll('.size-btn').forEach(function (b) {
          b.classList.toggle('active', b.dataset.size === size);
        });
      });
    });

    // --- Init ---
    renderTokens();
    updateNotesEmpty();
  }

  // Top-level escapeHtml for use before reader is initialized
  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

})();
  </script>
</body>
</html>
