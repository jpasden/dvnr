<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DVNR</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: Arial, sans-serif;
      background: #fafaf8;
      color: #222;
      line-height: 1.6;
    }
    header {
      background: #1a1a2e;
      color: #e8e8f0;
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #2a2a4e;
    }
    header h1 {
      font-size: 1.25rem;
      font-family: 'Pacifico', cursive;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: #e8e8f0;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .page-header {
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .page-title {
      font-size: 1.4rem;
      font-family: Arial, sans-serif;
    }
    .filter-btns {
      display: flex;
      gap: 0.4rem;
    }
    .filter-btn {
      padding: 0.25rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      color: #555;
      transition: background 0.12s, border-color 0.12s;
    }
    .filter-btn:hover { background: #f0f0f0; }
    .filter-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    .filter-btn.active-es { background: #ffeeba; color: #856404; border-color: #ffc107; }
    .filter-btn.active-it { background: #d4edda; color: #155724; border-color: #c3e6cb; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }
    .card {
      display: flex;
      flex-direction: column;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      text-decoration: none;
      color: #222;
      transition: border-color 0.15s, box-shadow 0.15s;
      overflow: hidden;
    }
    .card:hover {
      border-color: #2a6496;
      box-shadow: 0 2px 10px rgba(42,100,150,0.12);
    }
    .card.hidden { display: none; }
    .card-header { padding: 0.6rem 0.9rem 0; }
    .lang-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .card-body {
      padding: 0.5rem 0.9rem 0.8rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
      line-height: 1.35;
    }
    .card-author {
      font-size: 0.82rem;
      color: #666;
      font-style: italic;
      margin-bottom: 0.4rem;
    }
    .card-footer {
      margin-top: auto;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .card-meta { font-size: 0.78rem; color: #999; }
    .empty { color: #777; font-style: italic; }
    footer {
      margin-top: 3rem;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="." style="color:#e8e8f0;text-decoration:none;">Dynamic Vocab Notes Reader</a></h1>
  </header>
  <main>
    <div class="page-header">
      <h1 class="page-title">Texts</h1>
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="es">ES</button>
        <button class="filter-btn" data-filter="it">IT</button>
      </div>
    </div>
    <div class="grid" id="grid">
      
    <a class="card" href="reader.html#gli-studenti-amano-il-corso-sulle-preposizioni-sai-perche" data-lang="it">
      <div class="card-header">
        <span class="lang-badge" style="background:#d4edda;color:#155724">IT</span>
      </div>
      <div class="card-body">
        <h2 class="card-title">Gli studenti AMANO il corso sulle preposizioni, sai perché? </h2>
        <p class="card-author">Stefano</p>
        <div class="card-footer">
          <span class="card-meta">369 words</span>
          <span class="card-meta">Mar 19, 2026</span>
        </div>
      </div>
    </a>
    <a class="card" href="reader.html#la-bicicleta" data-lang="es">
      <div class="card-header">
        <span class="lang-badge" style="background:#ffeeba;color:#856404">ES</span>
      </div>
      <div class="card-body">
        <h2 class="card-title">La Bicicleta</h2>
        <p class="card-author">Shakira</p>
        <div class="card-footer">
          <span class="card-meta">432 words</span>
          <span class="card-meta">Mar 19, 2026</span>
        </div>
      </div>
    </a>
    <a class="card" href="reader.html#el-secreto-de-mateo" data-lang="es">
      <div class="card-header">
        <span class="lang-badge" style="background:#ffeeba;color:#856404">ES</span>
      </div>
      <div class="card-body">
        <h2 class="card-title">El Secreto de Mateo</h2>
        <p class="card-author">Claude</p>
        <div class="card-footer">
          <span class="card-meta">193 words</span>
          <span class="card-meta">Mar 18, 2026</span>
        </div>
      </div>
    </a>
    </div>
  </main>
  <footer>DVNR — Dynamic Vocabulary Notes Reader</footer>
  <script>
    (function () {
      var btns = document.querySelectorAll('.filter-btn');
      var cards = document.querySelectorAll('.card');
      btns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var filter = btn.dataset.filter;
          btns.forEach(function (b) {
            b.classList.remove('active', 'active-es', 'active-it');
          });
          btn.classList.add('active');
          if (filter === 'es') btn.classList.add('active-es');
          if (filter === 'it') btn.classList.add('active-it');
          cards.forEach(function (card) {
            if (filter === 'all' || card.dataset.lang === filter) {
              card.classList.remove('hidden');
            } else {
              card.classList.add('hidden');
            }
          });
        });
      });
    })();
  </script>
</body>
</html>
