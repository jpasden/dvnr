<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spanish Texts — DVNR</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: Arial, sans-serif;
      background: #fafaf8;
      color: #222;
      line-height: 1.6;
    }
    header {
      background: #1a1a2e;
      color: #e8e8f0;
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #2a2a4e;
    }
    header h1 {
      font-size: 1.25rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: #e8e8f0;
    }
    header nav a {
      color: #c8c8e0;
      text-decoration: none;
      font-size: 0.9rem;
      margin-left: 1.5rem;
    }
    header nav a:hover { color: #fff; }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .page-title {
      font-size: 1.5rem;
      font-family: Arial, sans-serif;
      margin-bottom: 0.25rem;
    }
    .page-subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }
    .card {
      display: flex;
      flex-direction: column;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      text-decoration: none;
      color: #222;
      transition: border-color 0.15s, box-shadow 0.15s;
      overflow: hidden;
    }
    .card:hover {
      border-color: #2a6496;
      box-shadow: 0 2px 10px rgba(42,100,150,0.12);
      text-decoration: none;
    }
    .card-header {
      padding: 0.6rem 0.9rem 0;
    }
    .lang-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .card-body {
      padding: 0.5rem 0.9rem 0.8rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
      line-height: 1.35;
    }
    .card-author {
      font-size: 0.82rem;
      color: #666;
      font-style: italic;
      margin-bottom: 0.4rem;
    }
    .card-footer {
      margin-top: auto;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .card-meta {
      font-size: 0.78rem;
      color: #999;
    }
    .empty {
      color: #777;
      font-style: italic;
    }
    footer {
      margin-top: 3rem;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <header>
    <h1>DVNR</h1>
    <nav>
      <a href="../it/index.html">Italian</a>
    </nav>
  </header>
  <main>
    <h1 class="page-title">Spanish Texts</h1>
    <p class="page-subtitle">Click a text to open it in the reader.</p>
    <div class="grid">
      
    <a class="card" href="../index.html#la-bicicleta">
      <div class="card-header">
        <span class="lang-badge" style="background:#ffeeba;color:#856404">ES</span>
      </div>
      <div class="card-body">
        <h2 class="card-title">La Bicicleta</h2>
        <p class="card-author">Shakira</p>
        <div class="card-footer">
          <span class="card-meta">432 words</span>
          <span class="card-meta">Mar 19, 2026</span>
        </div>
      </div>
    </a>
    </div>
  </main>
  <footer>DVNR — Dynamic Vocabulary Notes Reader</footer>
</body>
</html>
