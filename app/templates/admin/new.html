{% extends "base.html" %}

{% block title %}Add New Text — Admin — DVNR{% endblock %}

{% block content %}
<div class="admin-container">
  <div class="admin-header">
    <h1>Add New Text</h1>
    <a href="/admin" class="btn btn-small">← Back to list</a>
  </div>

  <form method="POST" action="/admin/new" id="admin-new-form">
    <div class="form-group">
      <label for="title-input">Title <span class="required">*</span></label>
      <input type="text" id="title-input" name="title" required
             placeholder="e.g. El Secreto de Mateo">
    </div>

    <div class="form-group">
      <label for="author-input">Author <span class="optional">(optional)</span></label>
      <input type="text" id="author-input" name="author"
             placeholder="e.g. Gabriel García Márquez">
    </div>

    <div class="form-group">
      <label>Language <span class="required">*</span></label>
      <div class="lang-toggle" id="admin-lang-toggle">
        <button type="button" class="lang-btn active" data-lang="es">ES — Spanish</button>
        <button type="button" class="lang-btn" data-lang="it">IT — Italian</button>
      </div>
      <input type="hidden" name="language" id="language-input" value="es">
    </div>

    <div class="form-group">
      <label for="raw-text-input">
        Text <span class="required">*</span>
        <span class="word-count-label" id="admin-word-count"></span>
      </label>
      <textarea id="raw-text-input" name="raw_text" rows="20" required
                placeholder="Paste the Spanish or Italian text here…"></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" id="admin-submit-btn">
        Add text →
      </button>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  const langToggle = document.getElementById('admin-lang-toggle');
  const langInput = document.getElementById('language-input');
  const textarea = document.getElementById('raw-text-input');
  const wordCountLabel = document.getElementById('admin-word-count');
  const form = document.getElementById('admin-new-form');
  const overlay = document.getElementById('loading-overlay');

  function setLang(lang) {
    langInput.value = lang;
    langToggle.querySelectorAll('.lang-btn').forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
  }

  langToggle.addEventListener('click', function (e) {
    if (e.target.classList.contains('lang-btn')) {
      setLang(e.target.dataset.lang);
    }
  });

  function updateWordCount() {
    const text = textarea.value.trim();
    const count = text === '' ? 0 : text.split(/\s+/).length;
    wordCountLabel.textContent = '(' + count + ' words)';
  }

  textarea.addEventListener('input', updateWordCount);
  updateWordCount();

})();
</script>
{% endblock %}
